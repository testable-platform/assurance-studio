version: '3.1'
source: Testable_Strategy_Metrics_Mapping_v0.2 (3).xlsx
branch_naming: v2
branch_types:
- Bug
- BugFX
- TCC
- CC
techniques:
- technique_code: SA
  l2: Structural Analysis
  l3: Cyclomatic Complexity
  report_group_label: Structural Analysis
  metrics:
  - metric_code: EPI
    module_key: execution_path_integrity
    branch_slug: Execution-Path-Integrity
    l4_classification: Static Analysis Metric
    l5_metric: Execution Path Integrity
    taxonomy_classification: Static Analysis Metric
    tools:
      python:
        primary: Crosshair
        secondary: Mccabe
    emitted_directly: false
    derivation: "execution_path_integrity = (\n    functions_without_counterexample\
      \ / max(total_functions_checked, 1)\n)"
    raw_formula: CC = E – N + 2P  (E=edges, N=nodes, P=connected components)
    expected_threshold: <= 10 per function (lower is better)
    normalisation: MAX(0, 100 – ((CC–1)/9 × 100))  capped 0–100
    execution_frequency: Every Commit / PR
    source_row: 6
  - metric_code: DOV
    module_key: decision_outcome_verification
    branch_slug: Decision-Outcome-Verification
    l4_classification: Decision Coverage
    l5_metric: Decision Outcome Verification
    taxonomy_classification: Decision Coverage
    tools:
      python:
        primary: Coverage.py
        secondary: Mccabe
    emitted_directly: false
    derivation: decision_coverage = covered_branches / max(num_branches, 1)
    raw_formula: Health Score = (Modules with MI >= 65 / Total Modules) × 100
    expected_threshold: '>= 80% of modules in green zone (MI >= 65)'
    normalisation: Score = Health Score % [gate at 80%]
    execution_frequency: Every Commit / PR
    source_row: 7
  - metric_code: LSV
    module_key: logical_sub_expression_validation
    branch_slug: Logical-Sub-Expression-Validation
    l4_classification: Condition Coverage
    l5_metric: Logical Sub-expression Validation
    taxonomy_classification: Condition Coverage
    tools:
      python:
        primary: Pymcdc
        secondary: Mccabe
    emitted_directly: false
    derivation: condition_coverage = covered_mcdc_conditions / max(total_mcdc_conditions,
      1)
    raw_formula: Refactor ROI Score = Count(Modules with MI < 40) × 20 + Count(Modules
      with MI 40–64) × 5
    expected_threshold: 0 modules in red zone (MI < 40); < 10 in yellow zone
    normalisation: MAX(0, 100 – Refactor_ROI_Score)
    execution_frequency: Every Commit / PR
    source_row: 8
  - metric_code: TLCC
    module_key: total_logical_combinatorial_coverage
    branch_slug: Total-Logical-Combinatorial-Coverage
    l4_classification: Logic Coverage Metric
    l5_metric: Total Logical Combinatorial Coverage
    taxonomy_classification: Logic Coverage Metric
    tools:
      python:
        primary: Crosshair
        secondary: Mccabe
    emitted_directly: false
    derivation: "logical_combinatorial_coverage = (\n    functions_without_counterexample\
      \ / max(total_functions_checked, 1)\n)"
    raw_formula: Testability Score = AVG(MI) across all modules in scope
    expected_threshold: AVG MI >= 65 across codebase
    normalisation: Score = MIN(100, AVG_MI) [already 0–100 scale]
    execution_frequency: Every Commit / PR
    source_row: 9
  - metric_code: TDI
    module_key: technical_debt_impact
    branch_slug: Technical-Debt-Impact
    l4_classification: Maintainability Analysis
    l5_metric: Technical Debt Impact
    taxonomy_classification: Maintainability Analysis
    tools:
      python:
        primary: Radon/Lizard
        secondary: Mccabe
    emitted_directly: false
    derivation: technical_debt = sum(ccn_values)
    raw_formula: MI Delta = AVG(MI_Current_Sprint) – AVG(MI_Previous_Sprint)
    expected_threshold: MI Delta >= 0 (no degradation); flag if delta < -3
    normalisation: MAX(0, 100 + (MI_Delta × 5)) capped 0–100
    execution_frequency: Every Commit / PR
    source_row: 10
  - metric_code: QRA
    module_key: qa_resource_allocation
    branch_slug: QA-Resource-Allocation
    l4_classification: Test Prioritization
    l5_metric: QA Resource Allocation
    taxonomy_classification: Test Prioritization
    tools:
      python:
        primary: testmon
        secondary: Mccabe
    emitted_directly: false
    derivation: test_execution_efficiency = tests_saved / max(tests_all, 1)
    raw_formula: Regression Risk Score = Count(Modules with MI < 40 AND recently churned)
      × 25
    expected_threshold: 0 low-MI modules with recent churn
    normalisation: MAX(0, 100 – Regression_Risk_Score)
    execution_frequency: Every Commit / PR
    source_row: 11
- technique_code: RM
  l2: Readability / Maintainability
  l3: Cognitive Complexity
  report_group_label: Readability / Maintainability
  metrics:
  - metric_code: TDI
    module_key: technical_debt_impact
    branch_slug: Technical-Debt-Impact
    l4_classification: Maintainability Evaluation
    l5_metric: Technical Debt Impact
    taxonomy_classification: Maintainability Evaluation
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Technical Debt Score = min(100, cc * 5)'
    raw_formula: Debt Score = Count(Units with CogCC > 15) × 10 + Count(Units with
      CogCC 10–15) × 3
    expected_threshold: 0 units exceeding CogCC 15; < 5 units in amber range (10–15)
    normalisation: MAX(0, 100 – Debt_Score)
    execution_frequency: Every Commit / PR
    source_row: 12
  - metric_code: UTC
    module_key: unit_test_complexity
    branch_slug: Unit-Test-Complexity
    l4_classification: Testability Analysis
    l5_metric: Unit Test Complexity
    taxonomy_classification: Testability Analysis
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Unit Test Complexity = cc + 1'
    raw_formula: Test Complexity Score = AVG(CogCC) across all testable units in module
    expected_threshold: AVG CogCC <= 10 per module
    normalisation: MAX(0, 100 – ((AVG_CogCC – 1) / 9 × 100)) capped 0–100
    execution_frequency: Every Commit / PR
    source_row: 13
  - metric_code: DEPR
    module_key: defect_probability
    branch_slug: Defect-Probability
    l4_classification: Risk Detection
    l5_metric: Defect Probability
    taxonomy_classification: Risk Detection
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Defect Probability (%) = min(90, cc * 4)'
    raw_formula: Hotspot Count = Count(functions where CogCC > 20)
    expected_threshold: 0 functions with CogCC > 20
    normalisation: MAX(0, 100 – (Hotspot_Count × 15))
    execution_frequency: Every Commit / PR
    source_row: 14
  - metric_code: MOOP
    module_key: modularization_opportunity
    branch_slug: Modularization-Opportunity
    l4_classification: Refactoring Guidance
    l5_metric: Modularization Opportunity
    taxonomy_classification: Refactoring Guidance
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Suggested Modules = ceil(cc / 5)'
    raw_formula: Refactor Candidate % = (Functions with CogCC > 15 / Total Functions)
      × 100
    expected_threshold: < 5% of functions flagged as refactor candidates
    normalisation: MAX(0, 100 – (Refactor_Candidate% × 10))
    execution_frequency: Every Commit / PR
    source_row: 15
  - metric_code: RFF
    module_key: reviewer_fatigue_factor
    branch_slug: Reviewer-Fatigue-Factor
    l4_classification: Code Review Support
    l5_metric: Reviewer Fatigue Factor
    taxonomy_classification: Code Review Support
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Fatigue Score = cc * 3'
    raw_formula: Fatigue Score = Count(PRs containing functions with CogCC > 15) /
      Total PRs × 100
    expected_threshold: < 10% of PRs contain high-CogCC functions
    normalisation: MAX(0, 100 – (Fatigue_Score × 5))
    execution_frequency: Every Commit / PR
    source_row: 16
  - metric_code: QRA
    module_key: qa_resource_allocation
    branch_slug: QA-Resource-Allocation
    l4_classification: Testing Effort Prioritization
    l5_metric: QA Resource Allocation
    taxonomy_classification: Testing Effort Prioritization
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      if cc <= 3 → Low priority'
    raw_formula: Allocation Coverage % = (High-CogCC Functions with dedicated test
      cases / Total High-CogCC Functions) × 100
    expected_threshold: 100% of CogCC > 15 functions have dedicated test cases
    normalisation: Score = Allocation Coverage % [gate at 100%]
    execution_frequency: Every Commit / PR
    source_row: 17
  - metric_code: HCL
    module_key: human_cognitive_load
    branch_slug: Human-Cognitive-Load
    l4_classification: Code Understandability Analysis
    l5_metric: Human Cognitive Load
    taxonomy_classification: Code Understandability Analysis
    tools:
      python:
        primary: cognitive-ast
        secondary: radon_cc
    emitted_directly: false
    derivation: 'cc - cognitive complexity value

      Cognitive Load Score = cc * 5'
    raw_formula: CogCC = sum of nesting-weighted increments for breaks in linear flow
    expected_threshold: <= 15 per unit (lower is better)
    normalisation: MAX(0, 100 – ((CogCC–1)/14 × 100))  capped 0–100
    execution_frequency: Every Commit / PR
    source_row: 18
- technique_code: CQ
  l2: Code Quality Auditing
  l3: Code Duplication
  report_group_label: Code Quality Auditing
  metrics:
  - metric_code: MPFP
    module_key: multi_point_failure_probability
    branch_slug: Multi-Point-Failure-Probability
    l4_classification: Defect Propagation Risk Detection
    l5_metric: Multi-Point Failure Probability
    taxonomy_classification: Defect Propagation Risk Detection
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: MPFP = (GroupSize \times RiskFactor) / TotalFragments
    raw_formula: Propagation Risk = Count(Duplicated Blocks with confirmed defect
      history) × 20
    expected_threshold: 0 defect-linked duplicated blocks in codebase
    normalisation: MAX(0, 100 – Propagation_Risk)
    execution_frequency: Daily
    source_row: 20
  - metric_code: RELO
    module_key: redundancy_localization
    branch_slug: Redundancy-Localization
    l4_classification: Refactoring Identification
    l5_metric: Redundancy Localization
    taxonomy_classification: Refactoring Identification
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: Count of unique clone groups in report
    raw_formula: Redundancy Score = Count(Clone Clusters with >= 3 instances) × 10
      + Count(Clone Clusters with 2 instances) × 3
    expected_threshold: 0 clone clusters with 3+ instances; < 5 two-instance clusters
    normalisation: MAX(0, 100 – Redundancy_Score)
    execution_frequency: Daily
    source_row: 21
  - metric_code: SCS
    module_key: structural_cleanliness_score
    branch_slug: Structural-Cleanliness-Score
    l4_classification: Code Quality Assessment
    l5_metric: Structural Cleanliness Score
    taxonomy_classification: Code Quality Assessment
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: "Derivation: \n1 - (Total Duplicated Lines / Total Repository Lines)"
    raw_formula: Cleanliness Score = 100 – ((Duplicated Lines / Total Lines) × 100)
    expected_threshold: '>= 95% unique code (< 5% duplication)'
    normalisation: Score = Cleanliness Score % [gate at 95%]
    execution_frequency: Daily
    source_row: 22
  - metric_code: TSS
    module_key: test_suite_streamlining
    branch_slug: Test-Suite-Streamlining
    l4_classification: Test Maintenance Reduction
    l5_metric: Test Suite Streamlining
    taxonomy_classification: Test Maintenance Reduction
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: Duplicated Lines / Total lines
    raw_formula: Redundant Test % = (Duplicated Test Blocks / Total Test Lines) ×
      100
    expected_threshold: < 3% test code duplication
    normalisation: MAX(0, 100 – (Redundant_Test% / 3 × 100))
    execution_frequency: Daily
    source_row: 23
  - metric_code: ABPO
    module_key: abstraction_potential
    branch_slug: Abstraction-Potential
    l4_classification: Refactoring Opportunity Detection
    l5_metric: Abstraction Potential
    taxonomy_classification: Refactoring Opportunity Detection
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: Avg Fragment Size \times Clone Group Size
    raw_formula: Abstraction Score = (Lines Reducible via Abstraction / Total Duplicated
      Lines) × 100
    expected_threshold: '>= 80% of duplicated lines are abstractable'
    normalisation: Score = Abstraction Score % [gate at 80%]
    execution_frequency: Daily
    source_row: 24
  - metric_code: RFM
    module_key: regression_focus_mapping
    branch_slug: Regression-Focus-Mapping
    l4_classification: Risk-Based Testing Prioritization
    l5_metric: Regression Focus Mapping
    taxonomy_classification: Risk-Based Testing Prioritization
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: Total Duplicated Tokens / Total Repository Tokens
    raw_formula: Regression Focus % = (Duplicated Modules Covered by Regression Tests
      / Total Duplicated Modules) × 100
    expected_threshold: 100% of duplicated modules included in regression suite
    normalisation: Score = Regression Focus % [gate at 100%]
    execution_frequency: Daily
    source_row: 25
  - metric_code: SYVE
    module_key: synchronization_verification
    branch_slug: Synchronization-Verification
    l4_classification: Maintainability Testing
    l5_metric: Synchronization Verification
    taxonomy_classification: Maintainability Testing
    tools:
      python:
        primary: jscpd
        secondary: copydetect
    emitted_directly: false
    derivation: Lines in SYNC fragment / Lines in ASYNC fragment
    raw_formula: Duplication % = (Duplicated Lines / Total Lines) × 100
    expected_threshold: <= 5% duplicated lines preferred
    normalisation: MAX(0, 100 – (Dup% / 5 × 100))  [5% = score 0]
    execution_frequency: Daily
    source_row: 26
- technique_code: LR
  l2: Static Code Analysis
  l3: Lint / Rule Violations
  report_group_label: Static Code Analysis
  metrics:
  - metric_code: VDK
    module_key: violation_density_per_kloc
    branch_slug: Violation-Density-Per-KLOC
    l4_classification: Rule Detection Test
    l5_metric: Violation Density per KLOC
    taxonomy_classification: Rule Detection Test
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: N = total number of JSON objects (violations)
    raw_formula: Violation Density = (Errors×3 + Warnings×1) / (LOC/1000)
    expected_threshold: 0 blocking errors; < 10 warnings per KLOC
    normalisation: MAX(0, 100 – (Errors×5 + Warnings×1))
    execution_frequency: Every Commit / PR
    source_row: 27
  - metric_code: RWI
    module_key: resource_waste_identification
    branch_slug: Resource-Waste-Identification
    l4_classification: Unused Variable Detection
    l5_metric: Resource Waste Identification
    taxonomy_classification: Unused Variable Detection
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Total Duplicate Lines = SUM(endLine - line + 1)
    raw_formula: Dead Allocation % = (Unused Variables / Total Declared Variables)
      × 100
    expected_threshold: < 1% unused variable declarations per module
    normalisation: MAX(0, 100 – (Dead_Allocation% × 50))
    execution_frequency: Every Commit / PR
    source_row: 28
  - metric_code: SCS
    module_key: semantic_consistency_score
    branch_slug: Semantic-Consistency-Score
    l4_classification: Naming Convention Validation
    l5_metric: Semantic Consistency Score
    taxonomy_classification: Naming Convention Validation
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Semantic Consistency = 1 - (Unique Rule Types / Total Violations)
    raw_formula: Convention Violation Rate = (Naming Violations / Total Named Identifiers)
      × 100
    expected_threshold: < 2% naming convention violations across codebase
    normalisation: MAX(0, 100 – (Convention_Violation_Rate × 25))
    execution_frequency: Every Commit / PR
    source_row: 29
  - metric_code: SUS
    module_key: syntactic_uniformity_score
    branch_slug: Syntactic-Uniformity-Score
    l4_classification: Code Style Rule Validation
    l5_metric: Syntactic Uniformity Score
    taxonomy_classification: Code Style Rule Validation
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Uniformity Score = 1 - (STDEV(duplicate line counts) / AVERAGE(duplicate
      line counts))
    raw_formula: Style Violation Density = Style Violations / (LOC / 1000)
    expected_threshold: < 5 style violations per KLOC
    normalisation: MAX(0, 100 – (Style_Violation_Density × 10))
    execution_frequency: Every Commit / PR
    source_row: 30
  - metric_code: STM
    module_key: structural_threshold_monitoring
    branch_slug: Structural-Threshold-Monitoring
    l4_classification: Complexity Rule Detection
    l5_metric: Structural Threshold Monitoring
    taxonomy_classification: Complexity Rule Detection
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Threshold Score = COUNT(duplicate lines > 10) / Total Violations
    raw_formula: Complexity Breach Count = Count(Functions exceeding nesting depth
      > 4 or length > 50 lines)
    expected_threshold: 0 functions breaching nesting or length thresholds
    normalisation: MAX(0, 100 – (Complexity_Breach_Count × 10))
    execution_frequency: Every Commit / PR
    source_row: 31
  - metric_code: IMPR
    module_key: impact_prioritization
    branch_slug: Impact-Prioritization
    l4_classification: Rule Severity Classification
    l5_metric: Impact Prioritization
    taxonomy_classification: Rule Severity Classification
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Impact Score = Unique Modules / Unique Files
    raw_formula: Severity Score = Count(Error violations) × 10 + Count(Warning violations)
      × 2 + Count(Info violations) × 0.5
    expected_threshold: 0 Error-level violations; < 10 Warning-level per KLOC
    normalisation: MAX(0, 100 – Severity_Score)
    execution_frequency: Every Commit / PR
    source_row: 32
  - metric_code: ARA
    module_key: aggregated_risk_assessment
    branch_slug: Aggregated-Risk-Assessment
    l4_classification: Multiple Violations Detection
    l5_metric: Aggregated Risk Assessment
    taxonomy_classification: Multiple Violations Detection
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Risk Score = Total Violations * Average Duplicate Lines
    raw_formula: Hotfile Score = Count(Files with > 10 violations) × 15 + Count(Files
      with 5–10 violations) × 5
    expected_threshold: 0 files with > 10 violations; < 5 files in amber range
    normalisation: MAX(0, 100 – Hotfile_Score)
    execution_frequency: Every Commit / PR
    source_row: 33
  - metric_code: ACTU
    module_key: accuracy_tuning
    branch_slug: Accuracy-Tuning
    l4_classification: False Positive Prevention
    l5_metric: Accuracy Tuning
    taxonomy_classification: False Positive Prevention
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Accuracy = 1 - (Unique Rule IDs - 1) / Total Violations
    raw_formula: False Positive Rate % = (Intentionally suppressed violations / Total
      Flagged Violations) × 100
    expected_threshold: < 10% suppression rate (high suppression signals misconfigured
      rules)
    normalisation: MAX(0, 100 – (False_Positive_Rate% × 5))
    execution_frequency: Every Commit / PR
    source_row: 34
  - metric_code: PSE
    module_key: project_specific_enforcement
    branch_slug: Project-Specific-Enforcement
    l4_classification: Custom Rule Validation
    l5_metric: Project-Specific Enforcement
    taxonomy_classification: Custom Rule Validation
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Project Enforcement = Unique Modules / Total Violations
    raw_formula: Custom Rule Pass Rate % = (Custom Rule Checks Passing / Total Custom
      Rule Checks) × 100
    expected_threshold: 100% of project-specific custom rules passing
    normalisation: Score = Custom Rule Pass Rate % [gate at 100%]
    execution_frequency: Every Commit / PR
    source_row: 35
  - metric_code: ENST
    module_key: environment_standardization
    branch_slug: Environment-Standardization
    l4_classification: Configuration File Handling
    l5_metric: Environment Standardization
    taxonomy_classification: Configuration File Handling
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Standardization = Unique Types / Total Violations
    raw_formula: Config Drift Score = Count(Devs with lint config deviating from team
      standard)
    expected_threshold: 0 developers with non-standard lint configuration
    normalisation: MAX(0, 100 – (Config_Drift_Score × 25))
    execution_frequency: Every Commit / PR
    source_row: 36
  - metric_code: AUGA
    module_key: automated_gatekeeping
    branch_slug: Automated-Gatekeeping
    l4_classification: CI/CD Integration Validation
    l5_metric: Automated Gatekeeping
    taxonomy_classification: CI/CD Integration Validation
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Gate = IF(Total Violations > Threshold, "FAIL", "PASS")
    raw_formula: Pipeline Gate Pass Rate % = (Builds passing lint gate / Total Builds)
      × 100
    expected_threshold: 100% of builds pass lint quality gate before merge
    normalisation: Score = Pipeline Gate Pass Rate % [gate at 100%]
    execution_frequency: Every Commit / PR
    source_row: 37
  - metric_code: QAT
    module_key: quality_audit_trail
    branch_slug: Quality-Audit-Trail
    l4_classification: Violation Reporting Validation
    l5_metric: Quality Audit Trail
    taxonomy_classification: Violation Reporting Validation
    tools:
      python:
        primary: pylint
        secondary: flake8
    emitted_directly: false
    derivation: Audit Score = Filled Fields / Total Expected Fields
    raw_formula: Report Coverage % = (Violations with line-number + fix suggestion
      logged / Total Violations) × 100
    expected_threshold: '>= 95% of violations have complete audit log entry'
    normalisation: Score = Report Coverage % [gate at 95%]
    execution_frequency: Every Commit / PR
    source_row: 38
- technique_code: SX
  l2: Security White-box Testing
  l3: Static Vulnerabilities (SAST)
  report_group_label: Security White-box Testing
  metrics:
  - metric_code: BPC
    module_key: best_practice_compliance
    branch_slug: Best-Practice-Compliance
    l4_classification: Secure Coding Validation
    l5_metric: Best Practice Compliance
    taxonomy_classification: Secure Coding Validation
    tools:
      python:
        primary: Semgrep OSS + Bandit
        secondary: semgrep
    emitted_directly: false
    derivation: 'Compliance Score =

      1 - ((Semgrep ERROR + Bandit HIGH + Bandit MEDIUM) / loc)'
    raw_formula: Compliance Score = (OWASP-Compliant Functions / Total Functions)
      × 100
    expected_threshold: '>= 95% of functions compliant with secure coding guidelines'
    normalisation: Score = Compliance Score % [gate at 95%]
    execution_frequency: Every Commit / PR
    source_row: 40
  - metric_code: EPS
    module_key: entry_point_sanitization
    branch_slug: Entry-Point-Sanitization
    l4_classification: Input Validation Testing
    l5_metric: Entry Point Sanitization
    taxonomy_classification: Input Validation Testing
    tools:
      python:
        primary: Semgrep OSS + Bandit
        secondary: bandit
    emitted_directly: false
    derivation: 'Entry Points =

      count(Semgrep injection-related results)'
    raw_formula: Sanitization Coverage % = (Sanitized Entry Points / Total External
      Entry Points) × 100
    expected_threshold: 100% of external entry points have input sanitization
    normalisation: Score = Sanitization Coverage % [gate at 100%]
    execution_frequency: Every Commit / PR
    source_row: 41
  - metric_code: SIT
    module_key: sensitive_information_tracking
    branch_slug: Sensitive-Information-Tracking
    l4_classification: Data Flow Security Analysis
    l5_metric: Sensitive Information Tracking
    taxonomy_classification: Data Flow Security Analysis
    tools:
      python:
        primary: Semgrep OSS + Bandit
        secondary: bandit
    emitted_directly: false
    derivation: 'Sensitive Exposure Count =

      count(Semgrep secret-related results)'
    raw_formula: Data Leak Score = Count(Sensitive Data Paths reaching insecure output)
      × 30
    expected_threshold: 0 sensitive data paths reaching logs or unencrypted output
    normalisation: MAX(0, 100 – Data_Leak_Score) [any leak = BLOCK]
    execution_frequency: Every Commit / PR
    source_row: 42
  - metric_code: ACV
    module_key: access_control_verification
    branch_slug: Access-Control-Verification
    l4_classification: Authentication & Authorization Weakness Detection
    l5_metric: Access Control Verification
    taxonomy_classification: Authentication & Authorization Weakness Detection
    tools:
      python:
        primary: Semgrep OSS + Bandit
        secondary: bandit
    emitted_directly: false
